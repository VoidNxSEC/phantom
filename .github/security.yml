name: Security

on:
  schedule:
    # Run weekly on Sunday at midnight UTC
    - cron: "0 0 * * 0"
  push:
    branches: [main]
    paths:
      - "**/pyproject.toml"
      - "**/requirements*.txt"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════════════
  # PYTHON SECURITY
  # ═══════════════════════════════════════════════════════════════
  python-audit:
    name: Python Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install audit tools
        run: |
          pip install pip-audit safety bandit

      - name: Run pip-audit
        run: pip-audit
        continue-on-error: true

      - name: Run safety check
        run: safety check --full-report
        continue-on-error: true

      - name: Run bandit (SAST)
        run: |
          bandit -r src/phantom -f json -o bandit-report.json
          bandit -r src/phantom -f txt
        continue-on-error: true

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json
        if: always()

  # ═══════════════════════════════════════════════════════════════
  # DEPENDENCY REVIEW (for PRs)
  # ═══════════════════════════════════════════════════════════════
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # ═══════════════════════════════════════════════════════════════
  # SECRET SCANNING
  # ═══════════════════════════════════════════════════════════════
  secrets-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets
        run: |
          detect-secrets scan --all-files --exclude-files '\.lock$' > secrets-report.json
          cat secrets-report.json
        continue-on-error: true

      - name: Check for high entropy strings
        run: |
          detect-secrets scan --all-files --exclude-files '\.lock$' 2>&1 | grep -i "potential" || echo "✓ No secrets detected"

      - name: Upload secrets report
        uses: actions/upload-artifact@v4
        with:
          name: secrets-scan-report
          path: secrets-report.json
        if: always()
