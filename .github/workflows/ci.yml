name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  # ═══════════════════════════════════════════════════════════════
  # CODE QUALITY
  # ═══════════════════════════════════════════════════════════════
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check src/ tests/

      - name: Check linting
        run: ruff check src/ tests/

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install mypy
          pip install -e ".[dev]" || pip install pydantic types-requests

      - name: Run mypy
        run: mypy src/phantom --ignore-missing-imports
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════
  # TESTS
  # ═══════════════════════════════════════════════════════════════
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Cache model weights
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: ${{ runner.os }}-models-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-models-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          # Install all required dependencies
          pip install pydantic rich typer requests psutil
          pip install sentence-transformers transformers torch tiktoken
          pip install fastapi uvicorn python-multipart httpx
          pip install scikit-learn nltk

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --junit-xml=pytest-results.xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: pytest-results.xml
          check_name: Test Results (Python ${{ matrix.python-version }})
        continue-on-error: true

      - name: Run tests with coverage
        if: matrix.python-version == '3.13'
        run: |
          pytest tests/ -v --cov=phantom --cov-report=xml --cov-report=term --cov-report=html

      - name: Upload coverage HTML
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

      - name: Upload coverage
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════
  # BUILD VALIDATION
  # ═══════════════════════════════════════════════════════════════
  build:
    name: Build Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Check package
        run: |
          pip install twine
          twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/

  # ═══════════════════════════════════════════════════════════════
  # NIX BUILD (optional - only if Nix available)
  # ═══════════════════════════════════════════════════════════════
  nix-build:
    name: Nix Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: phantom
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true

      - name: Check flake
        run: nix flake check --no-build
        continue-on-error: true

      - name: Build phantom package
        run: nix build .#phantom --print-build-logs
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════
  # PERFORMANCE BENCHMARKS
  # ═══════════════════════════════════════════════════════════════
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-benchmark
          pip install pydantic rich typer requests psutil
          pip install sentence-transformers transformers torch tiktoken
          pip install fastapi uvicorn python-multipart httpx
          pip install scikit-learn nltk

      - name: Run benchmarks
        run: |
          # Run basic performance tests if they exist
          pytest tests/ -v -k "performance or benchmark" --benchmark-only || echo "No benchmark tests found"
        continue-on-error: true

      - name: Comment benchmark results
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Performance benchmark completed. Check the Actions logs for detailed results.'
            })
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════
  # CI SUCCESS GATE
  # ═══════════════════════════════════════════════════════════════
  ci-success:
    name: CI Success
    needs: [lint, type-check, test, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check CI status
        run: |
          echo "================================"
          echo "    CI/CD Pipeline Summary"
          echo "================================"
          echo "Lint:       ${{ needs.lint.result }}"
          echo "Type Check: ${{ needs.type-check.result }}"
          echo "Tests:      ${{ needs.test.result }}"
          echo "Build:      ${{ needs.build.result }}"
          echo "================================"

          # Fail if critical jobs failed
          if [ "${{ needs.lint.result }}" == "failure" ]; then
            echo "❌ Linting failed"
            exit 1
          fi

          if [ "${{ needs.test.result }}" == "failure" ]; then
            echo "❌ Tests failed"
            exit 1
          fi

          if [ "${{ needs.build.result }}" == "failure" ]; then
            echo "❌ Build failed"
            exit 1
          fi

          echo "✅ All critical CI checks passed!"
