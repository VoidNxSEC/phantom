name: Python CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    uses: VoidNxSEC/voidnxlabs-workflows/.github/workflows/reusable-python-ci.yml@main
    secrets: inherit
    with:
      python-version: "3.11"
      coverage-threshold: "70"
