name: Nix CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix-ci:
    uses: VoidNxSEC/voidnxlabs-workflows/.github/workflows/reusable-nix-ci.yml@main
    secrets: inherit
    with:
      cachix-name: "phantom"
