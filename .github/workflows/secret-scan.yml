name: Secret Scan

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:
    # manual trigger scans full history

jobs:
  phantom-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for complete scan

      - uses: cachix/install-nix-action@v27

      - name: Run Phantom leak scan
        run: |
          bash scripts/phantom-scan-check.sh .
