repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: check-json

  - repo: local
    hooks:
      - id: phantom-import-check
        name: phantom import sanity check
        entry: python -c "import sys; sys.path.insert(0,'src'); from phantom import *"
        language: system
        pass_filenames: false
        types: [python]
